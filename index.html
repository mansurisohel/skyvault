<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Skyvault - Premium AI-powered weather platform" />
    <title>Skyvault Weather</title>
    <script>
      // Apply saved theme before React loads to prevent flash
      try {
        const t = localStorage.getItem('wx_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
